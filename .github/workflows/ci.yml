name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel in-progress runs for the same ref so we don't burn minutes on
# stale pushes / superseded PR commits. New commits get a fresh run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to the least privilege. Individual jobs can widen per-step
# (`actions/checkout@v4` already has its own scoping).
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.34

      - name: Install
        # First-run uses non-frozen install so bun can generate bun.lockb.
        # Subsequent runs should commit bun.lockb and switch to --frozen-lockfile.
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test

      - name: Bundle (smoke build)
        run: bun run build

      - name: Compile binary (linux/musl)
        run: bun run build:compile

      - name: Smoke test the binary
        run: |
          set -e
          ./dist/apex-pi --help
          MCP_DATA=$(mktemp -d) APEX_PI_DATA=$MCP_DATA MCP_PORT=18080 ./dist/apex-mcp &
          MCP_PID=$!
          sleep 2
          curl -fsS http://127.0.0.1:18080/healthz
          kill $MCP_PID 2>/dev/null || true
          rm -rf $MCP_DATA
          HTTP_DATA=$(mktemp -d) APEX_PI_DATA=$HTTP_DATA LLM_PROVIDER=openai LLM_MODEL=gpt-4o-mini LLM_API_KEY=test-key PORT=18081 ./dist/apex-pi &
          HTTP_PID=$!
          sleep 2
          curl -fsS http://127.0.0.1:18081/healthz
          curl -fsS http://127.0.0.1:18081/readyz
          kill $HTTP_PID 2>/dev/null || true
          rm -rf $HTTP_DATA

      - name: Docker build
        run: docker build -t apex-pi:ci .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.34
      - run: bun install
      - run: bun run typecheck
