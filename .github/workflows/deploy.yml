name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Ping Fly API
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl api ping
          flyctl apps list --json | head -c 500
          echo "---"
          echo "FLY_APP var = ${{ vars.FLY_APP }}"
