[install]
# Pin to lockfile in CI; allow updates in dev.
frozenLockfile = false
exact = false

[install.cache]
disable = false

[test]
# Memory + codegraph tests need a writable temp dir (mkdtempSync in beforeAll).
# preload intentionally omitted — empty arrays are rejected by Bun's bunfig parser.

[run]
# Bun tries to use .env automatically; we read it through config.ts instead.
bun = true
